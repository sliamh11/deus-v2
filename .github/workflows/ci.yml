name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads the PR changed-file list via the API on pull_request runs

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci

      - name: No personal identifiers in diff
        # Pattern is stored as a repo secret to avoid committing the values
        # themselves into this file. Excludes this workflow file from the scan
        # so editing the gate doesn't trip it.
        env:
          PATTERN: ${{ secrets.PERSONAL_ID_PATTERN }}
          # Explicit, auditable escape hatch (repo Variable, not a secret --
          # visible in Settings > Actions > Variables) for the transitional
          # period after migrating to this repo, before PERSONAL_ID_PATTERN
          # is configured here. Tracked: LIA-439. Must be unset (or "false")
          # once the secret is added -- this is not meant to be permanent.
          ALLOW_MISSING_PERSONAL_ID_PATTERN: ${{ vars.ALLOW_MISSING_PERSONAL_ID_PATTERN }}
        run: |
          set -euo pipefail
          if [ -z "${PATTERN:-}" ]; then
            if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ] || [ "${{ github.actor }}" = "dependabot[bot]" ]; then
              echo "::warning::PERSONAL_ID_PATTERN unavailable in fork/dependabot PR; skipping"
              exit 0
            fi
            if [ "${ALLOW_MISSING_PERSONAL_ID_PATTERN:-}" = "true" ]; then
              echo "::warning::PERSONAL_ID_PATTERN secret not yet configured on this repo; skipping personal-identifier scan because the explicit ALLOW_MISSING_PERSONAL_ID_PATTERN repo variable is set to true (tracked: LIA-439). Add the secret and unset this variable to close the gap."
              exit 0
            fi
            echo "::error::PERSONAL_ID_PATTERN secret not set; required for non-fork PRs. Set the secret, or set the ALLOW_MISSING_PERSONAL_ID_PATTERN repo variable to 'true' as an explicit, auditable temporary bypass (tracked: LIA-439)."
            exit 1
          fi
          BASE_REF="${{ github.base_ref }}"
          BASE_REF="${BASE_REF:-main}"
          # Scan only ADDED lines (leading '+', excluding the '+++' file
          # header) so that REMOVING personal identifiers — e.g. deleting a
          # leaking file — does not trip the gate on its own deletion lines.
          if git diff "origin/${BASE_REF}...HEAD" -- ':(exclude).github/workflows/ci.yml' ':(exclude)LICENSE' | grep -E '^\+' | grep -vE '^\+\+\+' | grep -qE "${PATTERN}"; then
            echo "::error::Personal identifiers found in diff — public-repo code must be user-agnostic (feedback_public_repo_generic)"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Typecheck skill hosts
        run: npx tsc -p tsconfig.skills.json --noEmit

      - name: Tests
        run: npx vitest run

      - name: Install pytest
        # httpx is pinned because the warden tests below import codex_review ->
        # cross_family_review, which sys.exit()s on a missing httpx at module load: a
        # breaking httpx major would otherwise surface as a cryptic collection-time exit
        # rather than a clean failure. Installed here (before any pytest step) so the
        # warden suite is always collectable.
        run: python3 -m pip install pytest 'httpx>=0.27,<1.0'

      - name: Pattern drift check
        run: python3 scripts/drift_check.py --all --base origin/${{ github.base_ref }}

      - name: Pattern tests (Python)
        run: python3 -m pytest scripts/tests/test_drift_check.py scripts/tests/test_prune_warden_backups.py scripts/tests/test_session_preflight.py scripts/tests/test_session_preflight_hook.py scripts/tests/test_sync_linear_pending.py -v

      - name: Warden review tests
        # Regression-protect the provider-agnostic warden co-gate engine: the gpt +
        # openai_compat backends, the role specs, the strict-AND gate / loop guard / HITL
        # override (test_warden_review), the driver (test_codex_warden), the codex engine
        # (test_codex_review), the Phase 3 co-gate oracle, and the full hook engine incl.
        # the admin-merge + structural-check gates (test_codex_warden_hooks), and the
        # one-command co-gate marker wrapper (test_cogate). All hermetic — the gh CLI and
        # model seams are mocked, so no codex CLI / gh / network is touched.
        run: python3 -m pytest scripts/tests/test_warden_review.py scripts/tests/test_codex_warden.py scripts/tests/test_codex_review.py scripts/tests/test_phase3_cogate_oracle.py scripts/tests/test_codex_warden_hooks.py scripts/tests/test_cogate.py -v

      - name: Session type contract tests
        run: python3 -m pytest tests/test_session_type_contract.py -v

      - name: CLAUDE.md keyword coverage
        run: scripts/token_bench/ci_coverage_gate.sh origin/${{ github.base_ref }}

      - name: Install evolution test dependencies
        # google-genai is import-only for memory_indexer (the network client is
        # never built in tests); required so test_memory_indexer_contradiction_commit
        # can import the module. See that test's module docstring.
        run: python3 -m pip install sqlite-vec==0.1.6 google-genai

      - name: Evolution tests
        run: python3 -m pytest evolution/tests/ -v

      - name: Validate commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  test-packages:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
      - uses: actions/setup-node@v6
        if: steps.filter.outputs.packages == 'true'
        with:
          node-version: 20
      - name: Build and test packages
        if: steps.filter.outputs.packages == 'true'
        run: |
          # Build core first (dependency for all channel packages)
          cd packages/mcp-channel-core && npm install && npm run build && npm test && cd ../..
          # Build and test all channel packages dynamically
          for pkg in packages/mcp-*/; do
            [ "$pkg" = "packages/mcp-channel-core/" ] && continue
            echo "::group::Testing $pkg"
            cd "$pkg" && npm install && npm run build && npm test && cd ../..
            echo "::endgroup::"
          done

  test-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Build
        working-directory: tui
        run: cargo build --release
      - name: Clippy
        working-directory: tui
        run: cargo clippy -- -D warnings
      - name: Format check
        working-directory: tui
        run: cargo fmt -- --check
      - name: Tests
        working-directory: tui
        run: cargo test

  test-windows:
    # Pinned: windows-latest moved to a VS 18 image that node-gyp 10.x cannot
    # detect, breaking the better-sqlite3 native build at `npm ci`. windows-2022
    # ships VS 2022 (recognized). Revert to windows-latest once node-gyp supports VS 18.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

  test-agent-runner:
    runs-on: ubuntu-latest
    # PR-only, mirroring test-packages (merge queue is not enabled on this repo).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            agent-runner:
              - 'container/agent-runner/**'
      - uses: actions/setup-node@v6
        if: steps.filter.outputs.agent-runner == 'true'
        with:
          node-version: 20
      - name: Test agent-runner
        if: steps.filter.outputs.agent-runner == 'true'
        working-directory: container/agent-runner
        run: |
          npm ci
          # vitest isn't a declared dep (the container Dockerfile installs devDeps
          # into the runtime image), so declaring it would bloat the agent image.
          # Install ephemerally, pinned to the root's version (see root package-lock).
          npm install --no-save vitest@4.1.8
          npx vitest run
