name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci

      - name: No personal identifiers in diff
        # Pattern is stored as a repo secret to avoid committing the values
        # themselves into this file. Excludes this workflow file from the scan
        # so editing the gate doesn't trip it.
        env:
          PATTERN: ${{ secrets.PERSONAL_ID_PATTERN }}
        run: |
          set -euo pipefail
          if [ -z "${PATTERN:-}" ]; then
            if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ] || [ "${{ github.actor }}" = "dependabot[bot]" ]; then
              echo "::warning::PERSONAL_ID_PATTERN unavailable in fork/dependabot PR; skipping"
              exit 0
            fi
            echo "::error::PERSONAL_ID_PATTERN secret not set; required for non-fork PRs"
            exit 1
          fi
          BASE_REF="${{ github.base_ref }}"
          BASE_REF="${BASE_REF:-main}"
          # Scan only ADDED lines (leading '+', excluding the '+++' file
          # header) so that REMOVING personal identifiers — e.g. deleting a
          # leaking file — does not trip the gate on its own deletion lines.
          if git diff "origin/${BASE_REF}...HEAD" -- ':(exclude).github/workflows/ci.yml' ':(exclude)LICENSE' | grep -E '^\+' | grep -vE '^\+\+\+' | grep -qE "${PATTERN}"; then
            echo "::error::Personal identifiers found in diff — public-repo code must be user-agnostic (feedback_public_repo_generic)"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Pattern drift check
        run: python3 scripts/drift_check.py --all --base origin/${{ github.base_ref }}

      - name: Pattern tests (Python)
        run: python3 -m pytest scripts/tests/test_drift_check.py scripts/tests/test_prune_warden_backups.py -v

      - name: Session type contract tests
        run: python3 -m pytest tests/test_session_type_contract.py -v

      - name: CLAUDE.md keyword coverage
        run: scripts/token_bench/ci_coverage_gate.sh origin/${{ github.base_ref }}

      - name: Install evolution test dependencies
        # google-genai is import-only for memory_indexer (the network client is
        # never built in tests); required so test_memory_indexer_contradiction_commit
        # can import the module. See that test's module docstring.
        run: python3 -m pip install sqlite-vec==0.1.6 google-genai

      - name: Evolution tests
        run: python3 -m pytest evolution/tests/ -v

      - name: Validate commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  test-packages:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
      - uses: actions/setup-node@v6
        if: steps.filter.outputs.packages == 'true'
        with:
          node-version: 20
      - name: Build and test packages
        if: steps.filter.outputs.packages == 'true'
        run: |
          # Build core first (dependency for all channel packages)
          cd packages/mcp-channel-core && npm install && npm run build && npm test && cd ../..
          # Build and test all channel packages dynamically
          for pkg in packages/mcp-*/; do
            [ "$pkg" = "packages/mcp-channel-core/" ] && continue
            echo "::group::Testing $pkg"
            cd "$pkg" && npm install && npm run build && npm test && cd ../..
            echo "::endgroup::"
          done

  test-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Build
        working-directory: tui
        run: cargo build --release
      - name: Clippy
        working-directory: tui
        run: cargo clippy -- -D warnings
      - name: Format check
        working-directory: tui
        run: cargo fmt -- --check
      - name: Tests
        working-directory: tui
        run: cargo test

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

  test-agent-runner:
    runs-on: ubuntu-latest
    # PR-only, mirroring test-packages (merge queue is not enabled on this repo).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            agent-runner:
              - 'container/agent-runner/**'
      - uses: actions/setup-node@v6
        if: steps.filter.outputs.agent-runner == 'true'
        with:
          node-version: 20
      - name: Test agent-runner
        if: steps.filter.outputs.agent-runner == 'true'
        working-directory: container/agent-runner
        run: |
          npm ci
          # vitest isn't a declared dep (the container Dockerfile installs devDeps
          # into the runtime image), so declaring it would bloat the agent image.
          # Install ephemerally, pinned to the root's version (see root package-lock).
          npm install --no-save vitest@4.1.8
          npx vitest run
